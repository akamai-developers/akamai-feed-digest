apiVersion: batch/v1
kind: CronJob
metadata:
  name: feed-crawler
  namespace: feed-digest
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          nodeSelector:
            node.kubernetes.io/instance-type: g6-standard-4
          containers:
            - name: feed-crawler
              image: ${DOCKERHUB_USER}/feed-digest:latest
              command: ["python", "-m", "crawler.main"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: feed-digest-secrets
                      key: DATABASE_URL
          restartPolicy: OnFailure
