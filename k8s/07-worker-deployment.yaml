apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: feed-digest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feed-digest-worker
  template:
    metadata:
      labels:
        app: feed-digest-worker
    spec:
      nodeSelector:
        node.kubernetes.io/instance-type: g6-standard-4
      containers:
        - name: feed-digest-worker
          image: ${DOCKERHUB_USER}/feed-digest:latest
          command: ["python", "-m", "worker.main"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: feed-digest-secrets
                  key: DATABASE_URL
            - name: VLLM_BASE_URL
              value: "http://vllm-nemotron-predictor.feed-digest.svc.cluster.local"
