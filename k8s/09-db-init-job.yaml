apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: feed-digest
spec:
  backoffLimit: 3
  template:
    spec:
      nodeSelector:
        node.kubernetes.io/instance-type: g6-standard-4
      containers:
        - name: db-init
          image: ${DOCKERHUB_USER}/feed-digest:latest
          command: ["python", "-m", "app.db", "--init"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: feed-digest-secrets
                  key: DATABASE_URL
      restartPolicy: OnFailure
