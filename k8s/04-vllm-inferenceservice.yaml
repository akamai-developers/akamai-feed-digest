apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: vllm-nemotron
  namespace: feed-digest
  annotations:
    serving.knative.dev/scaleToZeroPodRetentionPeriod: "5m"
spec:
  predictor:
    minReplicas: 0
    maxReplicas: 1
    containers:
      - name: kserve-container
        image: nvcr.io/nvidia/vllm:25.12-py3
        command:
          - python3
          - -m
          - vllm.entrypoints.openai.api_server
        args:
          - --model
          - nvidia/NVIDIA-Nemotron-Nano-9B-v2-FP8
          - --max-model-len
          - "8192"
          - --trust-remote-code
        ports:
          - containerPort: 8000
            protocol: TCP
        resources:
          requests:
            memory: "16Gi"
            nvidia.com/gpu: "1"
          limits:
            memory: "24Gi"
            nvidia.com/gpu: "1"
    nodeSelector:
      node.kubernetes.io/instance-type: g2-gpu-rtx4000a1-m
