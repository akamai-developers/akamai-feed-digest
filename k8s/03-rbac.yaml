apiVersion: v1
kind: ServiceAccount
metadata:
  name: feed-digest-app
  namespace: feed-digest
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: feed-digest
rules:
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: feed-digest-pod-reader
  namespace: feed-digest
subjects:
  - kind: ServiceAccount
    name: feed-digest-app
    namespace: feed-digest
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
